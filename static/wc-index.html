<!-- ============================================================
  天树刷机 (Skytree Flasher)
  架构：SPA 壳 + Web Component (Shadow DOM closed) 
  
  安全隔离原则：
    1. 每个组件 Shadow DOM closed — 外部无法访问内部 DOM
    2. 全局总线只传递事件，不传递函数引用
    3. 组件只能通过属性接收数据，不能读全局变量
    4. 一个组件崩溃不影响其他组件
    5. Socket.IO 动态加载，不阻塞页面
  ============================================================ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天树刷机 (Skytree Flasher)</title>
<link rel="stylesheet" href="/static/css/base.css">
</head>
<body>

  <!-- ===== 顶部栏 ===== -->
  <header class="sk-topbar">
    <span class="sk-topbar-title">天树刷机</span>
    <div class="sk-topbar-actions">
      <span class="ws-dot" id="skWsIndicator"></span>
      <button class="sk-theme-btn" id="skThemeToggle">🌙</button>
    </div>
  </header>

  <!-- ===== 全局状态栏 ===== -->
  <div class="sk-global-status">
    <span class="pulse-dot"></span>
    <span id="globalStatusText">启动中...</span>
  </div>

  <!-- ===== 主内容区 ===== -->
  <main class="sk-main">
    <sk-panel data-view="device" active><device-panel></device-panel></sk-panel>
    <sk-panel data-view="batch" style="display:none"><flash-panel></flash-panel></sk-panel>
    <sk-panel data-view="tools" style="display:none"><tools-panel></tools-panel></sk-panel>
    <sk-panel data-view="workbench" style="display:none"><workbench-panel></workbench-panel></sk-panel>
    <sk-panel data-view="version" style="display:none"><version-panel></version-panel></sk-panel>
  </main>

  <!-- ===== 底部导航 ===== -->
  <nav class="sk-bottom-nav">
    <button class="sk-nav-item active" data-view="device"><span class="nav-icon">⌁</span><span class="nav-label">设备</span></button>
    <button class="sk-nav-item" data-view="batch"><span class="nav-icon">⇅</span><span class="nav-label">线刷</span></button>
    <button class="sk-nav-item" data-view="version"><span class="nav-icon">版</span><span class="nav-label">版本</span></button>
    <button class="sk-nav-item" data-view="tools"><span class="nav-icon">⌘</span><span class="nav-label">工具</span></button>
    <button class="sk-nav-item" data-view="workbench"><span class="nav-icon">🛠</span><span class="nav-label">工作台</span></button>
  </nav>

  <!-- ============================================================
       核心代码 — 内联，零加载延迟
       ============================================================ -->
  <script>
  'use strict';

  // ==================================================================
  // 全局事件总线（唯一共享通道）
  // 组件只能通过 on/emit 传递事件，不共享函数
  // ==================================================================
  const Bus = (() => {
    const _ls = {};
    return {
      on(e, fn) { if (!_ls[e]) _ls[e] = []; _ls[e].push(fn); return () => this.off(e, fn); },
      off(e, fn) { if (_ls[e]) _ls[e] = _ls[e].filter(f => f !== fn); },
      emit(e, d) { if (_ls[e]) [..._ls[e]].forEach(fn => { try { fn(d); } catch(ex) { console.warn(`[Bus] ${e}:`, ex); } }); }
    };
  })();
  window.Bus = Bus;

  // ==================================================================
  // 应用外壳
  // ==================================================================
  const App = (() => {
    const _s = { ws: null, connected: false, backendUrl: '', view: 'device' };
    const _d = {};

    function _q(id) { return document.getElementById(id); }

    function _cache() {
      _d.nav = document.querySelectorAll('.sk-nav-item');
      _d.panels = document.querySelectorAll('sk-panel');
      _d.status = _q('globalStatusText');
      _d.wsDot = _q('skWsIndicator');
      _d.themeBtn = _q('skThemeToggle');
    }

    function _switchView(v) {
      if (v === _s.view) return;
      _s.view = v;
      _d.panels.forEach(p => {
        const act = p.dataset.view === v;
        p.setAttribute('active', act ? '' : null);
        p.style.display = act ? '' : 'none';
      });
      _d.nav.forEach(n => n.classList.toggle('active', n.dataset.view === v));
      try { localStorage.setItem('sv', v); } catch(e) {}
    }

    function _toggleTheme() {
      const el = document.documentElement;
      const dark = el.getAttribute('data-theme') !== 'light';
      el.setAttribute('data-theme', dark ? 'light' : 'dark');
      _d.themeBtn.textContent = dark ? '☀️' : '🌙';
      try { localStorage.setItem('st', dark ? 'light' : 'dark'); } catch(e) {}
    }

    function _initTheme() {
      let t; try { t = localStorage.getItem('st'); } catch(e) {}
      const dark = t !== 'light';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      if (_d.themeBtn) _d.themeBtn.textContent = dark ? '☀️' : '🌙';
    }

    function setStatus(text, type) {
      const el = _d.status;
      if (!el) return;
      el.textContent = text;
      el.className = type ? `st-${type}` : '';
      Bus.emit('status', { text, type });
    }

    function setWsConnected(v) {
      _s.connected = v;
      if (_d.wsDot) {
        _d.wsDot.className = `ws-dot ${v ? 'connected' : 'disconnected'}`;
        _d.wsDot.title = v ? '后端已连接' : '后端未连接';
      }
    }

    function _loadIO() {
      if (window.io) return Promise.resolve(window.io);
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.socket.io/4.5.4/socket.io.min.js';
        s.onload = () => res(window.io);
        s.onerror = () => rej(new Error('Socket.IO 加载失败'));
        document.body.appendChild(s);
      });
    }

    async function connectWs(url) {
      if (_s.ws) { _s.ws.disconnect(); _s.ws = null; }
      if (!url) { setWsConnected(false); return; }
      try {
        await _loadIO();
        const wsUrl = url || window.location.origin;
        _s.ws = io(wsUrl, { transports: ['websocket', 'polling'], reconnection: true,
          reconnectionAttempts: 10, reconnectionDelay: 3000 });
        _s.ws.on('connect', () => { setWsConnected(true); Bus.emit('ws:connected', {}); });
        _s.ws.on('disconnect', () => { setWsConnected(false); Bus.emit('ws:disconnected', {}); });
        _s.ws.on('connect_error', (e) => { setWsConnected(false); Bus.emit('ws:error', { msg: e.message }); });
        _s.ws.on('task_progress', (d) => Bus.emit('task:progress', d));
        _s.ws.on('task_complete', (d) => Bus.emit('task:complete', d));
        _s.ws.on('error_diagnosis', (d) => Bus.emit('task:diagnosis', d));
      } catch(e) {
        console.warn('[App] WebSocket init:', e.message);
        setWsConnected(false);
      }
    }

    function init() {
      _cache();
      _initTheme();

      let savedUrl;
      try { savedUrl = localStorage.getItem('sb'); } catch(e) {}
      const defUrl = window.location.origin.includes('github.io') ? '' : window.location.origin;
      _s.backendUrl = savedUrl || defUrl;
      if (_s.backendUrl) connectWs(_s.backendUrl);

      // 导航
      _d.nav.forEach(n => n.addEventListener('click', () => _switchView(n.dataset.view)));

      // 主题
      if (_d.themeBtn) _d.themeBtn.addEventListener('click', _toggleTheme);

      // 恢复上次视图
      let sv; try { sv = localStorage.getItem('sv'); } catch(e) {}
      _switchView(sv || 'device');

      setWsConnected(false);
      setStatus('未连接设备 · 请先检测设备');
      console.log('[App] ready');
    }

    return {
      init,
      setStatus,
      connectWs,
      getBackendUrl: () => _s.backendUrl,
      getWS: () => _s.ws,
      isConnected: () => _s.connected,
      switchView: _switchView,
    };
  })();

  // 暴露的最小 API（只读 + 事件）
  window.App = App;
  // 向后的别名（组件里仍可用 SkytreeBus/SkytreeApp）
  window.SkytreeBus = Bus;
  window.SkytreeApp = App;
  console.log('[App] core loaded');
  </script>

  <!-- ===== Web Components（外部加载） ===== -->
  <script src="/static/components/device-panel.js"></script>
  <script src="/static/components/flash-panel.js"></script>
  <script src="/static/components/tools-panel.js"></script>
  <script src="/static/components/workbench-panel.js"></script>
  <script src="/static/components/version-panel.js"></script>

  <!-- ===== 启动（必须在组件之后） ===== -->
  <script>
  'use strict';
  try {
    App.init();
  } catch(e) {
    console.error('[App] init failed:', e);
    var el = document.getElementById('globalStatusText');
    if (el) el.textContent = '⚠️ 启动失败: ' + e.message;
  }
  </script>
</body>
</html>
